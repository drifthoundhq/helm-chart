suite: secret
templates:
  - templates/secret.yaml

tests:
  - it: does not create a Secret when drifthoundSecrets is empty
    asserts:
      - hasDocuments:
          count: 0

  - it: creates a Secret when drifthoundSecrets is set
    set:
      drifthoundSecrets:
        SECRET_KEY_BASE: abc123
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret

  - it: names the Secret after the fullname
    set:
      drifthoundSecrets:
        SECRET_KEY_BASE: abc123
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-drifthound

  - it: base64-encodes secret values
    set:
      drifthoundSecrets:
        SECRET_KEY_BASE: abc123
    asserts:
      - equal:
          path: data.SECRET_KEY_BASE
          value: YWJjMTIz

  - it: does not create a Secret when existingSecret is set
    set:
      existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: does not create a Secret when both existingSecret and drifthoundSecrets are set
    set:
      existingSecret: my-external-secret
      drifthoundSecrets:
        SECRET_KEY_BASE: abc123
    asserts:
      - hasDocuments:
          count: 0

  - it: adds hook annotations when migrations are enabled
    set:
      drifthoundSecrets:
        SECRET_KEY_BASE: abc123
      migrations:
        enabled: true
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install,pre-upgrade
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-10"

  - it: has no hook annotations when migrations are disabled
    set:
      drifthoundSecrets:
        SECRET_KEY_BASE: abc123
      migrations:
        enabled: false
    asserts:
      - isNull:
          path: metadata.annotations
