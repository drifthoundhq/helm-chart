name: Test Charts

on:
  pull_request:
    paths:
      - charts/**
  push:
    branches:
      - main
    paths:
      - charts/**

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.3.2 --verify=false

      - name: Lint
        run: helm lint charts/drifthound

      - name: Unit tests
        run: helm unittest charts/drifthound
